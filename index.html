<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <script defer src="./index.js"></script>
    <title>Registration Form</title>
  </head>
  <body>
    <section class="formSection">
      <h2 class="form-h2">Contact form</h2>
      <p class="form-intro">
        Please fill in your information and we'll be sending your order.
      </p>
      <form class="userForm">
        <label class="form-row">
          <span class="label-text">Your name</span>
          <div class="input-group">
            <input
              type="text"
              name="user-first-name"
              placeholder="first name"
              pattern="[A-Za-z]{2,20}"
            />
            <input
              type="text"
              name="user-last-name"
              placeholder="last name"
              pattern="[A-Za-z]{2,20}"
            />
          </div>
        </label>

        <label class="form-row">
          <span class="label-text">Your email</span>
          <div class="input-group">
            <input
              type="email"
              name="user-email"
              placeholder="your_mail@mail.com"
            />
          </div>
        </label>

        <label class="form-row">
          <span class="label-text">Phone *</span>
          <div class="input-group phone-group">
            <input
              type="tel"
              name="phone1"
              maxlength="3"
              pattern="[0-9]{3}"
              required
              placeholder="000"
            />
            <input
              type="tel"
              name="phone2"
              maxlength="3"
              pattern="[0-9]{3}"
              required
              placeholder="000"
            />
            <input
              type="tel"
              name="phone3"
              maxlength="4"
              pattern="[0-9]{4}"
              required
              placeholder="0000"
            />
          </div>
        </label>

        <label class="form-row">
          <span class="label-text">Message subject *</span>
          <div class="input-group">
            <select name="user-message-subject" required>
              <option value="">Other</option>
              <option value="A">Order Issue</option>
              <option value="B">Partnership</option>
            </select>
          </div>
        </label>

        <label class="form-row">
          <span class="label-text">Message *</span>
          <div class="input-group">
            <textarea
              name="user-message"
              minlength="2"
              maxlength="250"
              rows="4"
              required
            ></textarea>
          </div>
        </label>

        <div class="btn-container">
          <button type="submit" class="submit-btn">SUBMIT FORM</button>
        </div>
      </form>
    </section>
  </body>
</html>
